<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks</title>
<link rel="stylesheet" href="themes.css" />
</head>
<body class="theme-glass">
  <div class="widget">
    <div class="bar">
      <span class="title">Tasks</span>
      <span class="count" id="count">0</span>
      <span class="spacer"></span>
      <button id="collapse" title="Collapse to just the list">▾</button>
      <button id="pin" title="Pin on top">📌</button>
      <button id="gear" title="Settings">⚙</button>
      <button id="min" title="Minimize">—</button>
      <button id="close" title="Close">✕</button>
    </div>

    <div class="tabs">
      <button data-v="tasks" class="active">✓ Tasks</button>
      <button data-v="habits">🔥 Habits</button>
    </div>

    <!-- TASKS VIEW -->
    <div id="tasksView" class="view">
      <div class="add">
        <button class="prio" id="prio" title="Set priority for new task">⚑</button>
        <input id="input" type="text" placeholder="Add a task…  (Enter)" maxlength="200" />
        <button class="go" id="go">+</button>
      </div>
      <div class="filters" id="filters">
        <button data-f="all" class="active">All</button>
        <button data-f="active">Active</button>
        <button data-f="done">Done</button>
        <button data-f="high">🔴 High</button>
      </div>
      <div class="list" id="list"></div>
    </div>

    <!-- HABITS VIEW -->
    <div id="habitsView" class="view" hidden>
      <div class="add">
        <input id="habitInput" type="text" placeholder="Add a daily habit…  (Enter)" maxlength="120" />
        <button class="go" id="habitGo">+</button>
      </div>
      <div class="list" id="habitList"></div>
    </div>

    <div class="foot">
      <span id="summary">0 of 0 done</span>
      <a id="clear">Clear done</a>
    </div>

    <div class="settings" id="settings">
      <h3>Customise <button id="gearClose">✕</button></h3>
      <div class="srow">
        <label>Theme</label>
        <div class="themes" id="themes"></div>
      </div>
      <div class="srow">
        <label>Accent</label>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="srow">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0.45" max="1" step="0.01" value="1" />
      </div>
      <div class="hint">Drag the top bar to move • drag edges to resize • 📌 pins above all windows • ▾ collapses to just the list • click a task's tag to set priority • everything saves automatically.</div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
