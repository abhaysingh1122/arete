<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tasks</title>
<style>
  :root {
    --wbg: rgba(20,20,30,0.8);
    --text: #f0f0f6;
    --muted: #a7a7bb;
    --accent: #6366f1;
    --surface: rgba(255,255,255,0.10);
    --surface-strong: rgba(255,255,255,0.20);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  html, body { height: 100%; background: transparent; overflow: hidden; user-select: none; }
  body { padding: 8px; }
  body.light { --wbg: rgba(248,248,252,0.85); --text: #1a1a24; --muted: #6a6a7b; --surface: rgba(0,0,0,0.06); --surface-strong: rgba(0,0,0,0.12); }

  .widget {
    height: 100%;
    display: flex; flex-direction: column;
    background: var(--wbg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    overflow: hidden;
    color: var(--text);
  }

  .bar { -webkit-app-region: drag; display: flex; align-items: center; gap: 8px; padding: 10px 12px 8px; }
  .bar .title { font-size: 14px; font-weight: 800; }
  .bar .count { -webkit-app-region: no-drag; font-size: 11px; color: #fff; background: var(--accent); padding: 1px 8px; border-radius: 20px; font-weight: 800; min-width: 20px; text-align: center; }
  .bar .spacer { flex: 1; }
  .bar button { -webkit-app-region: no-drag; width: 24px; height: 24px; border: none; border-radius: 10px; background: var(--surface); color: var(--muted); cursor: pointer; font-size: 13px; display: grid; place-items: center; transition: .15s; }
  .bar button:hover { background: var(--surface-strong); color: var(--text); }
  .bar button.on { background: var(--accent); color: #fff; }

  .add { display: flex; gap: 6px; padding: 4px 12px 10px; -webkit-app-region: no-drag; }
  .add input { flex: 1; border: none; outline: none; border-radius: 10px; background: var(--surface); color: var(--text); padding: 9px 11px; font-size: 13px; }
  .add input::placeholder { color: var(--muted); }
  .add .prio { width: 34px; border: none; border-radius: 10px; cursor: pointer; background: var(--surface); font-size: 16px; display: grid; place-items: center; }
  .add .go { width: 34px; border: none; border-radius: 10px; cursor: pointer; background: var(--accent); color: #fff; font-size: 18px; font-weight: 800; }

  .filters { display: flex; gap: 4px; padding: 0 12px 8px; -webkit-app-region: no-drag; }
  .filters button { border: none; cursor: pointer; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; color: var(--muted); background: transparent; transition: .15s; }
  .filters button.active { background: var(--surface-strong); color: var(--text); }

  .list { flex: 1; overflow-y: auto; padding: 0 8px 8px; -webkit-app-region: no-drag; }
  .list::-webkit-scrollbar { width: 6px; }
  .list::-webkit-scrollbar-thumb { background: var(--surface-strong); border-radius: 6px; }
  .empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 10px; line-height: 1.6; }

  .task { display: flex; align-items: flex-start; gap: 9px; padding: 9px 8px; border-radius: 11px; transition: background .15s; }
  .task:hover { background: rgba(255,255,255,0.08); }
  .task .check { width: 18px; height: 18px; border-radius: 6px; margin-top: 1px; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; display: grid; place-items: center; font-size: 11px; color: #fff; transition: .15s; }
  .task.done .check { background: var(--accent); border-color: var(--accent); }
  .task .txt { flex: 1; font-size: 13px; line-height: 1.45; word-break: break-word; cursor: text; }
  .task.done .txt { color: var(--muted); text-decoration: line-through; }
  .task .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; cursor: pointer; }
  .p1 { background: #3b82f6; } .p2 { background: #f59e0b; } .p3 { background: #ef4444; } .p0 { background: transparent; border: 1.5px solid var(--muted); }
  .task .del { opacity: 0; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 2px; transition: .15s; }
  .task:hover .del { opacity: 1; }
  .task .del:hover { color: #ef4444; }

  .foot { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--surface-strong); -webkit-app-region: no-drag; }
  .foot a { color: var(--muted); cursor: pointer; text-decoration: none; }
  .foot a:hover { color: var(--accent); }

  .settings { position: absolute; inset: 6px; border-radius: 18px; z-index: 20; background: var(--wbg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 14px; display: none; flex-direction: column; gap: 13px; -webkit-app-region: no-drag; }
  .settings.open { display: flex; }
  .settings h3 { font-size: 14px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .settings h3 button { border: none; background: var(--surface-strong); color: var(--text); width: 24px; height: 24px; border-radius: 10px; cursor: pointer; }
  .srow { display: flex; flex-direction: column; gap: 7px; }
  .srow label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 24px; height: 24px; border-radius: 7px; cursor: pointer; border: 2px solid transparent; }
  .swatch.sel { border-color: var(--text); }
  .modes { display: flex; gap: 6px; }
  .modes button { flex: 1; border: 1px solid var(--surface-strong); cursor: pointer; padding: 7px; border-radius: 9px; background: var(--surface); color: var(--text); font-size: 12px; font-weight: 700; }
  .modes button.sel { border-color: var(--accent); background: var(--surface-strong); }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .hint { font-size: 10px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
  <div class="widget">
    <div class="bar">
      <span class="title">Tasks</span>
      <span class="count" id="count">0</span>
      <span class="spacer"></span>
      <button id="pin" title="Pin on top">📌</button>
      <button id="gear" title="Settings">⚙</button>
      <button id="min" title="Minimize">—</button>
      <button id="close" title="Close">✕</button>
    </div>

    <div class="add">
      <button class="prio" id="prio" title="Set priority for new task">⚪</button>
      <input id="input" type="text" placeholder="Add a task…  (Enter)" maxlength="200" />
      <button class="go" id="go">+</button>
    </div>
    <div class="filters" id="filters">
      <button data-f="all" class="active">All</button>
      <button data-f="active">Active</button>
      <button data-f="done">Done</button>
    </div>
    <div class="list" id="list"></div>

    <div class="foot">
      <span id="summary">0 of 0 done</span>
      <a id="clear">Clear done</a>
    </div>

    <div class="settings" id="settings">
      <h3>Customise <button id="gearClose">✕</button></h3>
      <div class="srow">
        <label>Accent</label>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="srow">
        <label>Theme</label>
        <div class="modes" id="modes">
          <button data-m="dark" class="sel">Dark</button>
          <button data-m="light">Light</button>
        </div>
      </div>
      <div class="srow">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0.45" max="1" step="0.01" value="1" />
      </div>
      <div class="hint">Drag the top bar to move • drag edges to resize • 📌 pins above all windows • double-click a task to edit • everything saves automatically.</div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
